<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StackOpen – Ask Question</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<header class="header">
    <a href="index.html" class="logo">StackOpen</a>
    <div class="user-actions">
        <button id="themeToggle" class="icon-btn"><i class="fas fa-moon"></i></button>
        <span id="loggedInUser" style="display:none;"></span>
        <a href="login.html" id="loginLink" class="btn btn-outline">Login</a>
        <a href="signup.html" id="signupLink" class="btn btn-primary">Sign Up</a>
        <a href="profile.html" id="profileLink" class="btn btn-outline" style="display:none;">Profile</a>
        <button id="logoutBtn" class="btn btn-outline" style="display:none;">Logout</button>
    </div>
</header>

<div class="container">
    <aside class="sidebar">
        <nav><ul>
            <li><a href="index.html"><i class="fas fa-home"></i> Home Feed</a></li>
            <li><a href="leaderboard.html"><i class="fas fa-trophy"></i> Leaderboard</a></li>
        </ul></nav>
    </aside>

    <main class="main-content">
        <h1>Ask a Question</h1>
        <p class="subtitle">Get help from the community</p>

        <form id="createPostForm" class="form">
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" placeholder="e.g., How do I center a div in CSS?" required>
                <!-- Duplicate warning appears here -->
                <div id="duplicateWarning" class="duplicate-warning" style="display:none;">
                    <i class="fas fa-exclamation-triangle"></i>
                    <strong>Similar questions found — check before posting:</strong>
                    <div id="similarList"></div>
                </div>
            </div>

            <div class="form-group">
                <label for="body">Description</label>
                <textarea id="body" rows="6" placeholder="Describe your problem in detail..." required></textarea>
            </div>

            <div class="form-group">
                <label for="tags">Tags <span style="color:var(--text-secondary);font-weight:400">(comma separated)</span></label>
                <input type="text" id="tags" placeholder="e.g., javascript, css, react">
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Post Question</button>
            </div>
            <div id="formError" class="error-message"></div>
        </form>
    </main>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/posts.js"></script>
<script src="js/main.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    if (!localStorage.getItem('token')) {
        window.location.href = 'login.html?redirect=create-post.html';
        return;
    }

    // Duplicate detection
    let debounceTimer;
    document.getElementById('title').addEventListener('input', function() {
        clearTimeout(debounceTimer);
        const query = this.value.trim();
        if (query.length < 8) {
            document.getElementById('duplicateWarning').style.display = 'none';
            return;
        }
        debounceTimer = setTimeout(async () => {
            const matches = await API.checkDuplicates(query);
            const warning = document.getElementById('duplicateWarning');
            const list = document.getElementById('similarList');
            if (matches && matches.length > 0) {
                list.innerHTML = matches.map(m =>
                    `<a href="post.html?id=${m.id}" target="_blank">${escapeHTML(m.title)}</a>`
                ).join('');
                warning.style.display = 'block';
            } else {
                warning.style.display = 'none';
            }
        }, 500);
    });

    // Form submit
    document.getElementById('createPostForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const title = document.getElementById('title').value.trim();
        const body = document.getElementById('body').value.trim();
        const tags = document.getElementById('tags').value.trim();
        const errorDiv = document.getElementById('formError');

        if (!title || !body) { errorDiv.textContent = 'Title and body are required.'; return; }

        try {
            const newPost = await API.createPost({ title, body, tags });
            window.location.href = `post.html?id=${newPost.id}`;
        } catch (err) {
            errorDiv.textContent = 'Failed to create post. ' + err.message;
        }
    });
});
</script>
</body>
</html>
