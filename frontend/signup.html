<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StackOpen – Sign Up</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="logo">StackOpen</div>
        <div class="user-actions">
            <button id="themeToggle" class="icon-btn"><i class="fas fa-moon"></i></button>
            <span id="loggedInUser" style="display: none;"></span>
        </div>
    </header>

    <div class="auth-container">
        <div class="auth-card">
            <h1>Create an account</h1>
            <p>Join the developer community</p>
            <form id="signupForm" class="form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="developer123" required>
                </div>
                <div class="form-group">
                    <label for="email">Email (optional)</label>
                    <input type="email" id="email" name="email" placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="**********" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="**********" required>
                </div>
                <div id="signupError" class="error-message"></div>
                <button type="submit" class="btn btn-primary btn-block">Sign Up</button>
            </form>
            <p class="auth-redirect">Already have an account? <a href="login.html">Sign In</a></p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('signupForm');
            if (form) {
                form.addEventListener('submit', handleSignup);
            }
        });
    </script>
</body>
</html>
