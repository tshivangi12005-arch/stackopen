<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StackOpen – Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="logo">StackOpen</div>
        <div class="user-actions">
            <button id="themeToggle" class="icon-btn"><i class="fas fa-moon"></i></button>
            <span id="loggedInUser" style="display: none;"></span>
            <!-- No login/signup links on login page -->
        </div>
    </header>

    <div class="auth-container">
        <div class="auth-card">
            <h1>Welcome back</h1>
            <p>Enter your credentials to access your account</p>
            <form id="loginForm" class="form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="developer123" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="**********" required>
                </div>
                <div id="loginError" class="error-message"></div>
                <button type="submit" class="btn btn-primary btn-block">Sign in to StackOpen</button>
            </form>
            <p class="auth-redirect">Don't have an account? <a href="signup.html">Create Account</a></p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
    <!-- No inline script needed; handleLogin attached via auth.js? Actually we need to attach event listener -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('loginForm');
            if (form) {
                form.addEventListener('submit', handleLogin);
            }
        });
    </script>
</body>
</html>
